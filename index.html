<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Vault</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-layout">

    <!-- ── Sidebar ── -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          <span class="logo-text">JSON Vault</span>
        </div>
        <button class="icon-btn" id="btn-new-col" title="New Collection (Ctrl+N)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </div>

      <div class="sidebar-search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search entries…" autocomplete="off" spellcheck="false">
        <button id="search-clear" class="search-clear hidden" title="Clear">✕</button>
      </div>

      <div id="sidebar-body" class="sidebar-body"></div>

      <div class="sidebar-footer">
        <button class="footer-btn" id="btn-import" title="Import">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Import
        </button>
        <button class="footer-btn" id="btn-export-all" title="Export all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Export All
        </button>
      </div>
    </aside>

    <!-- ── Main Panel ── -->
    <div id="sidebar-resizer" class="sidebar-resizer" title="Drag to resize sidebar"></div>
    <main id="main-panel" class="main-panel"></main>
    <div class="json-depth-group settings-float">
      <button id="btn-settings" class="btn-depth settings-btn" title="Settings">
        <svg viewBox="0 0 16 12" width="14" height="11" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true">
          <line x1="1.5" y1="2" x2="14.5" y2="2"></line>
          <circle cx="5" cy="2" r="1.2"></circle>
          <line x1="1.5" y1="6" x2="14.5" y2="6"></line>
          <circle cx="10.5" cy="6" r="1.2"></circle>
          <line x1="1.5" y1="10" x2="14.5" y2="10"></line>
          <circle cx="7" cy="10" r="1.2"></circle>
        </svg>
      </button>
    </div>

  </div>

  <!-- ── Context Menu ── -->
  <div id="ctx-menu" class="ctx-menu hidden"></div>

  <!-- ── Modal ── -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box"></div>
  </div>

  <!-- ── Toast ── -->
  <div id="toast" class="toast hidden"></div>

  <!-- ── Hidden file input for import ── -->
  <input type="file" id="file-input" accept=".json" style="display:none">

  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
